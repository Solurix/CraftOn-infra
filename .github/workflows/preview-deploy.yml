name: preview-deploy

# Per-PR preview environment for the CRAFT-ON monorepo — both services at once.
#
# Every non-draft PR gets two fully isolated, STANDALONE Cloud Run services:
#   * `crafton-api-dev-pr<N>` + its own `crafton_pr<N>` database on the shared
#     `crafton-dev` Cloud SQL instance (migrates at boot, smoke-tested in isolation)
#   * `crafton-web-dev-pr<N>` whose image is baked (NEXT_PUBLIC_* are build-time)
#     against THIS PR's api preview URL — auto-paired, so an api+web change previews
#     end-to-end with no opt-in label needed (the two used to live in separate repos).
#
# WHY SEPARATE SERVICES (not `--no-traffic --tag`): a tagged revision does NOT
# sandbox configuration — `gcloud run deploy <shared-service> --update-env-vars …`
# mutates the shared service's base template, which once wedged the live API on a
# dropped preview DB. Dedicated per-PR services are fully isolated. See docs/12.
#
# Trust model: pull_request_target runs this workflow (and its credentialed steps)
# from `main`, so a PR can't rewrite them; CODEOWNERS gates the workflow + Dockerfiles.
# PR code is checked out only as build input and executes inside `docker build` and at
# preview runtime (as the thin runtime SAs). Fork PRs are skipped (no WIF token).
#
# NOTE: because this runs from `main`, pipeline changes only take effect after merge;
# the PR that introduces them can't validate itself.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  PROJECT_ID: crafton-dev-500709
  REGION: asia-northeast1
  WIF_PROVIDER: projects/784671749504/locations/global/workloadIdentityPools/github-actions/providers/github
  DEPLOYER_SA: crafton-deployer@crafton-dev-500709.iam.gserviceaccount.com
  PR: ${{ github.event.number }}
  # PR head sha — changes on every push, so the image tag stays unique.
  # (GITHUB_SHA is the base-branch sha under pull_request_target and would collide.)
  HEAD_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  # ── API preview ───────────────────────────────────────────────────────────────
  api:
    # Same-repo, non-draft PRs only (forks can't authenticate to GCP).
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.url.outputs.api_url }}
      db: ${{ steps.ids.outputs.db }}
    env:
      BASE_SERVICE: crafton-api-dev
      IMAGE: asia-northeast1-docker.pkg.dev/crafton-dev-500709/crafton/api
      RUNTIME_SA: crafton-api-dev@crafton-dev-500709.iam.gserviceaccount.com
      SQL_INSTANCE: crafton-dev
      SQL_CONNECTION: crafton-dev-500709:asia-northeast1:crafton-dev
      DB_SECRET: crafton-db-url
    steps:
      # PR head is checked out only as build input — no PR script runs on the runner.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Compute identifiers
        id: ids
        run: |
          SHORT_SHA="${HEAD_SHA::7}"
          echo "PREVIEW_SERVICE=${BASE_SERVICE}-pr${PR}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE}:pr${PR}-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "DB=crafton_pr${PR}" >> "$GITHUB_ENV"
          echo "db=crafton_pr${PR}" >> "$GITHUB_OUTPUT"

      # Isolated per-PR database (idempotent across synchronize pushes). See docs/12.
      - name: Create per-PR database
        run: |
          gcloud sql databases create "$DB" --instance="$SQL_INSTANCE" \
            --project "$PROJECT_ID" 2>/dev/null && echo "created $DB" \
            || echo "$DB already exists — reusing"

      - name: Build & push preview image
        run: |
          docker build --platform=linux/amd64 --provenance=false \
            -t "$IMAGE_TAG" ./api
          docker push "$IMAGE_TAG"

      # Dedicated per-PR service: full runtime config set explicitly (nothing can
      # leak onto the live service). Migrations run at container boot against $DB.
      - name: Deploy preview service
        run: |
          gcloud run deploy "$PREVIEW_SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --image "$IMAGE_TAG" \
            --labels "preview-pr=${PR}" \
            --service-account "$RUNTIME_SA" \
            --add-cloudsql-instances "$SQL_CONNECTION" \
            --set-secrets "CRAFTON_DATABASE_URL=${DB_SECRET}:latest" \
            --set-env-vars "CRAFTON_ENV=dev,CRAFTON_AUTH_MODE=fake,CRAFTON_STORAGE_MODE=fake,CRAFTON_FIREBASE_PROJECT_ID=${PROJECT_ID},CRAFTON_DB_NAME=${DB}" \
            --allow-unauthenticated \
            --quiet

      - name: Resolve preview URL
        id: url
        run: |
          API_URL=$(gcloud run services describe "$PREVIEW_SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          if [ -z "$API_URL" ]; then echo "could not read preview service URL"; exit 1; fi
          echo "API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      # Liveness via /openapi.json (NOT /healthz — Google's edge returns 404 for it
      # on *.run.app). Then signup→login→/me exercises a real write+read against the
      # isolated DB, proving migrations ran. First request cold-starts the service.
      - name: Smoke test the preview
        run: |
          echo "Preview API: $API_URL"
          code=""
          for i in $(seq 1 48); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/openapi.json" || true)
            [ "$code" = "200" ] && { echo "live after ~$((i*5))s"; break; }
            sleep 5
          done
          [ "$code" = "200" ] || { echo "::error::API never became live"; exit 1; }

          SUFFIX=$(printf '%08d' $(( (GITHUB_RUN_ID + RANDOM) % 100000000 )))
          PHONE="+8190${SUFFIX}"
          USER="smoke${GITHUB_RUN_ID}"
          PW="smoke-password-123"
          FAKE=$(printf '{"uid":"fake-%s","phone_number":"%s"}' "$PHONE" "$PHONE" \
            | base64 -w0 | tr '+/' '-_' | tr -d '=')

          echo "signup…"
          out=$(curl -s -w '\n%{http_code}' -X POST "$API_URL/api/v1/auth/session" \
            -H "Authorization: Bearer $FAKE" -H 'Content-Type: application/json' \
            -d "{\"user_type\":\"worker\",\"display_name\":\"Smoke\",\"username\":\"$USER\",\"email\":\"$USER@smoke.local\",\"password\":\"$PW\"}")
          body=$(printf '%s' "$out" | sed '$d'); scode=$(printf '%s' "$out" | tail -n1)
          echo "  -> $scode"
          case "$scode" in 200|201) ;; *) echo "$body"; exit 1;; esac

          echo "login…"
          out=$(curl -s -w '\n%{http_code}' -X POST "$API_URL/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"identifier\":\"$USER\",\"password\":\"$PW\"}")
          body=$(printf '%s' "$out" | sed '$d'); lcode=$(printf '%s' "$out" | tail -n1)
          echo "  -> $lcode"
          [ "$lcode" = "200" ] || { echo "$body"; exit 1; }
          TOKEN=$(printf '%s' "$body" | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])')

          echo "GET /me…"
          mecode=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/api/v1/me" \
            -H "Authorization: Bearer $TOKEN")
          echo "  -> $mecode"
          [ "$mecode" = "200" ] || { echo "::error::/me failed"; exit 1; }
          echo "SMOKE OK"

      - name: Comment API preview on the PR
        uses: actions/github-script@v7
        env:
          API_URL: ${{ env.API_URL }}
          DB: ${{ env.DB }}
          PREVIEW_SERVICE: ${{ env.PREVIEW_SERVICE }}
        with:
          script: |
            const marker = '<!-- crafton-preview-api -->';
            const { API_URL, DB, PREVIEW_SERVICE } = process.env;
            const pr = context.issue.number;
            const body = [
              marker,
              '### 🔎 API preview',
              `- **URL:** ${API_URL}`,
              `- **Database:** \`${DB}\` (isolated, migrated)`,
              `- **Service:** \`${PREVIEW_SERVICE}\` — standalone, isolated from the live API`,
              '',
              'Smoke test (signup → login → `/me`) passed against the isolated DB.',
              'Torn down automatically when this PR closes.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: pr,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body });
            }

  # ── Web preview (baked against this PR's api preview) ──────────────────────────
  web:
    needs: api
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      BASE_SERVICE: crafton-web-dev
      IMAGE: asia-northeast1-docker.pkg.dev/crafton-dev-500709/crafton/web
      AUTH_MODE: fake
      # This PR's api preview URL, produced by the `api` job above.
      API_BASE_URL: ${{ needs.api.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Compute identifiers
        run: |
          SHORT_SHA="${HEAD_SHA::7}"
          echo "PREVIEW_SERVICE=${BASE_SERVICE}-pr${PR}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE}:pr${PR}-${SHORT_SHA}" >> "$GITHUB_ENV"

      # NEXT_PUBLIC_* are inlined at build time, so the api preview URL must be baked.
      - name: Build & push preview image
        run: |
          docker build --platform=linux/amd64 --provenance=false \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$API_BASE_URL" \
            --build-arg NEXT_PUBLIC_AUTH_MODE="$AUTH_MODE" \
            -t "$IMAGE_TAG" ./web
          docker push "$IMAGE_TAG"

      - name: Deploy preview service
        run: |
          gcloud run deploy "$PREVIEW_SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --image "$IMAGE_TAG" \
            --labels "preview-pr=${PR}" \
            --set-env-vars "APP_ENV=dev" \
            --allow-unauthenticated \
            --quiet

      - name: Resolve preview URL
        run: |
          WEB_URL=$(gcloud run services describe "$PREVIEW_SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          if [ -z "$WEB_URL" ]; then echo "could not read preview service URL"; exit 1; fi
          echo "WEB_URL=$WEB_URL" >> "$GITHUB_ENV"

      - name: Smoke test the preview
        run: |
          echo "Preview web: $WEB_URL"
          code=000
          for i in $(seq 1 36); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$WEB_URL/" || echo 000)
            if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
              echo "served $code after ~$((i*5))s"; break
            fi
            sleep 5
          done
          if ! { [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; }; then
            echo "::error::web preview never served (last code: $code)"; exit 1
          fi

      - name: Comment web preview on the PR
        uses: actions/github-script@v7
        env:
          WEB_URL: ${{ env.WEB_URL }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
          PREVIEW_SERVICE: ${{ env.PREVIEW_SERVICE }}
        with:
          script: |
            const marker = '<!-- crafton-preview-web -->';
            const { WEB_URL, API_BASE_URL, PREVIEW_SERVICE } = process.env;
            const pr = context.issue.number;
            const body = [
              marker,
              '### 🖥️ Web preview',
              `- **URL:** ${WEB_URL}`,
              `- **API (baked):** ${API_BASE_URL} — this PR's api preview`,
              `- **Service:** \`${PREVIEW_SERVICE}\` — standalone, isolated from the live web app`,
              '',
              "Baked against this PR's api preview, so api+web changes preview end-to-end.",
              'Torn down automatically when this PR closes.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: pr,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body });
            }
